<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Chatbot</title>
    
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.1/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles.css') }}">
    
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
</head>
<body>
    <div class="top-header-bg">
        <h1>Medical Chat Bot</h1>
    </div>

    <div class="chat-container">
        <div class="chat">
            <div class="card">
                <div class="card-header">
                    <div class="user_info">
                        <span>Medical Chat Bot</span>
                        <p>Your helpful AI medical assistant, Ask me anything!</p>
                    </div>
                </div>
                
                <div id="chat-box" class="msg_card_body"></div>

                <div class="card-footer">
                    <form id="messageForm" class="input-group">
                        <input type="text" id="user-input" class="form-control type_msg" placeholder="Type your message..." required autocomplete="off">
                        <div class="input-group-append">
                            <button type="submit" class="input-group-text send_btn">
                                <i class="fas fa-location-arrow"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="developer-bubble">
        <p><strong>Developed by:</strong> Nikith Gokul Kommaddi</p>
        <p>This is a RAG based chatbot powered by Llama 3.2</p>
    </div>

    <script>
        $(document).ready(function() {
            let isSending = false;
            const BOT_IMG = "https://cdn-icons-png.flaticon.com/512/3774/3774293.png";
            const USER_IMG = "https://i.ibb.co/d5b84Xw/Untitled-design.png";

            function getTime() {
                const now = new Date();
                return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }

            function appendMessage(sender, text) {
                const time = getTime();
                const img = (sender === 'user') ? USER_IMG : BOT_IMG;
                const label = (sender === 'user') ? 'USER' : 'BOT';
                const side = (sender === 'user') ? 'justify-content-end' : 'justify-content-start';
                const bubble = (sender === 'user') ? 'msg_cotainer_send' : 'msg_cotainer';

                let html = `
                <div class="d-flex ${side} mb-4">
                    ${sender === 'bot' ? `<div class="img_cont_msg"><img src="${img}" class="rounded-circle user_img_msg"><span class="user_label">${label}</span></div>` : ''}
                    <div class="${bubble}">
                        ${text}
                        <span class="small d-block ${sender === 'user' ? 'text-right' : ''} mt-1" style="color:rgba(0,0,0,0.5); font-size: 10px;">${time}</span>
                    </div>
                    ${sender === 'user' ? `<div class="img_cont_msg"><img src="${img}" class="rounded-circle user_img_msg"><span class="user_label">${label}</span></div>` : ''}
                </div>`;

                $("#chat-box").append(html);
                $("#chat-box").scrollTop($("#chat-box")[0].scrollHeight);
            }

            function showLoading() {
                let loadingHtml = `
                <div id="temp-loading" class="d-flex justify-content-start mb-4">
                    <div class="img_cont_msg">
                        <img src="${BOT_IMG}" class="rounded-circle user_img_msg">
                        <span class="user_label">BOT</span>
                    </div>
                    <div class="msg_cotainer" style="background-color: #e1e1e1;">
                        <div class="typing"><span></span><span></span><span></span></div>
                    </div>
                </div>`;
                $("#chat-box").append(loadingHtml);
                $("#chat-box").scrollTop($("#chat-box")[0].scrollHeight);
            }

            $("#messageForm").on("submit", function(event) {
                event.preventDefault();
                if(isSending) return;
                let userMsg = $("#user-input").val().trim();
                if(!userMsg) return;

                isSending = true;
                appendMessage('user', userMsg);
                $("#user-input").val("");

                // Trigger loading dots ONLY here
                showLoading();

                $.ajax({
                    url: "/get",
                    type: "POST",
                    data: { msg: userMsg },
                    success: function(data) {
                        $("#temp-loading").remove(); // Remove dots completely
                        appendMessage('bot', data);
                        isSending = false;
                    },
                    error: function() {
                        $("#temp-loading").remove();
                        appendMessage('bot', "System error. Please try again.");
                        isSending = false;
                    }
                });
            });
        });
    </script>
</body>
</html>
