<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chatbot</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.1/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
    
    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
</head>

<body>
<div class="container-fluid h-100">
    <div class="row justify-content-center h-100">
        <div class="col-md-8 col-xl-6 chat">
            <div class="card">
                <!-- Header -->
                <div class="card-header msg_head">
                    <div class="d-flex bd-highlight">
                        <div class="img_cont">
                            <img src="https://www.prdistribution.com/spirit/uploads/pressreleases/2019/newsreleases/d83341deb75c4c4f6b113f27b1e42cd8-chatbot-florence-already-helps-thousands-of-patients-to-remember-their-medication.png" class="rounded-circle user_img">
                            <span class="online_icon"></span>
                        </div>
                        <div class="user_info">
                            <span>Textbook Chatbot</span>
                            <p>Ask me anything!</p>
                        </div>
                    </div>
                </div>

                <!-- Chat Body -->
                <div id="chat-box" class="card-body msg_card_body">
                    <!-- Messages will appear here -->
                </div>

                <!-- Footer / Input -->
                <div class="card-footer">
                    <form id="messageForm" class="input-group">
                        <input type="text" id="user-input" name="msg" placeholder="Type your message..." autocomplete="off" class="form-control type_msg" required>
                        <div class="input-group-append">
                            <button type="submit" class="input-group-text send_btn"><i class="fas fa-location-arrow"></i></button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<script>
$(document).ready(function() {

    // Function to append messages
    function appendMessage(sender, text) {
        const now = new Date();
        const time = now.getHours() + ":" + String(now.getMinutes()).padStart(2, "0");
        let messageHtml = '';

        if(sender === 'user') {
            messageHtml = `
            <div class="d-flex justify-content-end mb-4">
                <div class="msg_cotainer_send">${text}<span class="msg_time_send">${time}</span></div>
                <div class="img_cont_msg"><img src="https://i.ibb.co/d5b84Xw/Untitled-design.png" class="rounded-circle user_img_msg"></div>
            </div>`;
        } else if(sender === 'bot') {
            messageHtml = `
            <div class="d-flex justify-content-start mb-4">
                <div class="img_cont_msg"><img src="https://www.prdistribution.com/spirit/uploads/pressreleases/2019/newsreleases/d83341deb75c4c4f6b113f27b1e42cd8-chatbot-florence-already-helps-thousands-of-patients-to-remember-their-medication.png" class="rounded-circle user_img_msg"></div>
                <div class="msg_cotainer">${text}<span class="msg_time">${time}</span></div>
            </div>`;
        }

        $("#chat-box").append(messageHtml);
        $("#chat-box").scrollTop($("#chat-box")[0].scrollHeight);
    }

    // Typing indicator
    function showTyping() {
        const typingHtml = `
        <div id="typing-indicator" class="d-flex justify-content-start mb-4">
            <div class="img_cont_msg"><img src="https://www.prdistribution.com/spirit/uploads/pressreleases/2019/newsreleases/d83341deb75c4c4f6b113f27b1e42cd8-chatbot-florence-already-helps-thousands-of-patients-to-remember-their-medication.png" class="rounded-circle user_img_msg"></div>
            <div class="msg_cotainer">Bot is typing...</div>
        </div>`;
        $("#chat-box").append(typingHtml);
        $("#chat-box").scrollTop($("#chat-box")[0].scrollHeight);
    }

    function removeTyping() {
        $("#typing-indicator").remove();
    }

    // Send message
    $("#messageForm").on("submit", function(event) {
        event.preventDefault();
        const userMsg = $("#user-input").val().trim();
        if(userMsg === "") return;

        appendMessage('user', userMsg);
        $("#user-input").val("");

        showTyping();

        $.ajax({
            url: "/get",
            type: "POST",
            data: { msg: userMsg },
            success: function(data) {
                removeTyping();
                appendMessage('bot', data);
            },
            error: function() {
                removeTyping();
                appendMessage('bot', "Sorry, something went wrong!");
            }
        });
    });

    // Press Enter to send
    $("#user-input").keypress(function(e){
        if(e.which === 13 && !e.shiftKey){
            $("#messageForm").submit();
            e.preventDefault();
        }
    });

});
</script>

</body>
</html>
